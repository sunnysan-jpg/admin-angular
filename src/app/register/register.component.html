<div class="auth-container">
    <div class="bg-animation">
    <div class="gradient-orb orb-1"></div>
    <div class="gradient-orb orb-2"></div>
    <div class="gradient-orb orb-3"></div>
  </div>
  <mat-card class="auth-card">
    <div class="card-glow"></div>
    <div class="auth-header">
      <h2>Create Account</h2>
      <p class="subtitle">Please fill in your details to register</p>
    </div>
    
    <mat-card-content>
      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
        
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Name</mat-label>
            <input matInput formControlName="name" required>
            <mat-icon matPrefix>person</mat-icon>
            <mat-error *ngIf="registerForm.get('name')?.hasError('required')">
              Required
            </mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Phone</mat-label>
            <input matInput type="tel" formControlName="phone" required>
            <mat-icon matPrefix>phone</mat-icon>
            <mat-error *ngIf="registerForm.get('phone')?.hasError('required')">
              Required
            </mat-error>
          </mat-form-field>
     

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email" required>
          <mat-icon matPrefix>email</mat-icon>
          <mat-error *ngIf="registerForm.get('email')?.hasError('required')">
            Email is required
          </mat-error>
          <mat-error *ngIf="registerForm.get('email')?.hasError('email')">
            Enter a valid email
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input matInput type="password" formControlName="password" required>
          <mat-icon matPrefix>lock</mat-icon>
          <mat-error *ngIf="registerForm.get('password')?.hasError('required')">
            Password is required
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Address</mat-label>
          <input matInput formControlName="address" required>
          <mat-icon matPrefix>location_on</mat-icon>
          <mat-error *ngIf="registerForm.get('address')?.hasError('required')">
            Address is required
          </mat-error>
        </mat-form-field>

        <button mat-raised-button color="primary" type="submit"
                [disabled]="!registerForm.valid || isLoading" class="submit-button">
          <mat-spinner *ngIf="isLoading" diameter="20" class="button-spinner"></mat-spinner>
          {{ isLoading ? 'Creating Account...' : 'Register' }}
        </button>
      </form>
    </mat-card-content>
    
    <div class="auth-footer">
      <span>Already have an account?</span>
      <a routerLink="/login" class="link">Sign In</a>
    </div>
  </mat-card>
</div>
