<div class="category-dialog">
  <div class="dialog-header">
    <h2>🏷️ Select or Create Category</h2>
    <button class="btn-close" mat-dialog-close>✕</button>
  </div>

  <div class="dialog-content">
    <!-- Category List -->
    <div class="category-list" *ngIf="!showAddForm">
      <div class="category-item" *ngFor="let cat of categories" (click)="selectCategory(cat)">
        <div class="category-icon">🍄</div>
        <div class="category-info">
          <h4>{{ cat.name }}</h4>
          <p>{{ cat.description || 'No description' }}</p>
        </div>
        <div class="category-arrow">→</div>
      </div>

      <div class="empty-message" *ngIf="categories.length === 0">
        <p>No categories found. Create your first one!</p>
      </div>
    </div>

    <!-- Add New Category Form -->
    <div class="category-form" *ngIf="showAddForm">
      <form [formGroup]="categoryForm" (ngSubmit)="addCategory()">
        <div class="form-group">
          <label>Category Name *</label>
          <input 
            type="text" 
            formControlName="name" 
            placeholder="e.g., Oyster Mushrooms"
            autofocus>
        </div>

        <div class="form-group">
          <label>Description</label>
          <textarea 
            formControlName="description" 
            rows="3"
            placeholder="Optional description">
          </textarea>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn-primary" [disabled]="categoryForm.invalid">
            ✨ Create Category
          </button>
          <button type="button" class="btn-secondary" (click)="showAddForm = false">
            Cancel
          </button>
        </div>
      </form>
    </div>
  </div>

  <div class="dialog-footer">
    <button class="btn-add-new" (click)="showAddForm = true" *ngIf="!showAddForm">
      <span>➕</span> Add New Category
    </button>
  </div>
</div>
