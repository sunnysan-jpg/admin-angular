<div class="login-wrapper">
  <!-- Animated background -->
  <div class="bg-animation">
    <div class="gradient-orb orb-1"></div>
    <div class="gradient-orb orb-2"></div>
    <div class="gradient-orb orb-3"></div>
  </div>

  <!-- Login card -->
  <div class="login-card">
    <div class="card-glow"></div>
    
    <div class="login-header">
      <div class="icon-wrapper">
        <mat-icon class="login-icon">lock_open</mat-icon>
      </div>
      <h1 class="login-title">Welcome Back</h1>
      <p class="login-subtitle">Enter your credentials to continue</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      
      <!-- Email Input -->
      <div class="form-group">
        <label class="input-label">Email Address</label>
        <div class="input-container">
          <mat-icon class="input-icon">email</mat-icon>
          <input 
            type="email" 
            formControlName="email" 
            placeholder="Enter your email"
            class="form-input"
            [class.error]="loginForm.get('email')?.touched && loginForm.get('email')?.invalid">
        </div>
        <span class="error-text" *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.hasError('required')">
          Email is required
        </span>
        <span class="error-text" *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.hasError('email')">
          Please enter a valid email
        </span>
      </div>

      <!-- Password Input -->
      <div class="form-group">
        <label class="input-label">Password</label>
        <div class="input-container">
          <mat-icon class="input-icon">lock</mat-icon>
          <input 
            type="password" 
            formControlName="password" 
            placeholder="Enter your password"
            class="form-input"
            [class.error]="loginForm.get('password')?.touched && loginForm.get('password')?.invalid">
        </div>
        <span class="error-text" *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.hasError('required')">
          Password is required
        </span>
      </div>

      <!-- Submit Button -->
      <button 
        type="submit" 
        class="submit-btn"
        [disabled]="!loginForm.valid || isLoading"
        [class.loading]="isLoading">
        <span *ngIf="!isLoading" class="btn-text">
          Sign In
          <mat-icon>arrow_forward</mat-icon>
        </span>
        <span *ngIf="isLoading" class="btn-text">
          <mat-icon class="spinner">sync</mat-icon>
          Signing in...
        </span>
      </button>

    </form>

    <div class="login-footer">
      <div class="divider">
        <span>OR</span>
      </div>
      <p class="signup-text">
        Don't have an account? 
        <a routerLink="/register" class="signup-link">Create one now</a>
      </p>
    </div>
  </div>
</div>
